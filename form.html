<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feras Company | Patient Registration</title>
    <style>
        /* Modern Enterprise CSS Variables */
        :root {
            --bg-main: #f8fafc;
            --bg-surface: #ffffff;
            --bg-nav: rgba(255, 255, 255, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --brand-color: #2563eb;
            --brand-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-focus-ring: rgba(37, 99, 235, 0.2);
            --danger-color: #ef4444;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --success-border: #bbf7d0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --transition-speed: 0.3s;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --bg-nav: rgba(30, 41, 59, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --brand-color: #3b82f6;
            --brand-hover: #60a5fa;
            --border-color: #334155;
            --input-bg: #0f172a;
            --input-focus-ring: rgba(59, 130, 246, 0.25);
            --danger-color: #f87171;
            --success-bg: #064e3b;
            --success-text: #a7f3d0;
            --success-border: #047857;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* Glassmorphism Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--bg-nav);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition-speed), border-color var(--transition-speed);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--brand-color);
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 1px solid var(--border-color);
            padding-left: 20px;
        }

        .logo-icon {
            color: var(--brand-color);
        }

        /* Sleek Theme Toggle */
        .theme-switch {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-speed);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .theme-switch:hover {
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        /* Form Layout */
        .container {
            max-width: 850px;
            margin: 100px auto 60px;
            padding: 0 20px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .form-section {
            background: var(--bg-surface);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            transition: background var(--transition-speed), border-color var(--transition-speed);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand-color);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .required::after {
            content: " *";
            color: var(--danger-color);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 15px;
            padding: 12px 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px var(--input-focus-ring);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background-color: var(--brand-color);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--brand-hover);
        }

        .btn-submit:active {
            transform: translateY(2px);
        }

        #success-message {
            display: none;
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-border);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            margin-top: 30px;
            box-shadow: var(--card-shadow);
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .logo {
                border-left: none;
                padding-left: 0;
            }
            .back-link span {
                display: none; /* Hides the "Home" text on very small screens, leaves the arrow */
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="back-link">← <span>Home</span></a>
            <div class="logo">
                <span class="logo-icon">✦</span> Feras Company
            </div>
        </div>
        <button type="button" id="themeToggle" class="theme-switch">
            <span id="themeIcon">🌙</span> <span id="themeText">Dark</span>
        </button>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Patient Registration Form</h1>
            <p>Please fill out the confidential medical details below.</p>
        </div>

        <form id="patientForm" action="https://formspree.io/f/xwvgbbrj" method="POST">
            
            <!-- Section 1: Personal Information -->
            <div class="form-section">
                <h2 class="section-title">01. Personal Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="firstName" class="required">First Name</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName" class="required">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="dob" class="required">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="gender" class="required">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select...</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer_not_to_say">Prefer not to say</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="phone" class="required">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+966 5X XXX XXXX" pattern="^(?:\+966|0)?5[0-9]{8}$" title="Please enter a valid Saudi phone number starting with +9665 or 05" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="patient@example.com">
                    </div>
                    <div class="form-group full-width">
                        <label for="address" class="required">Home Address</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                </div>
            </div>

            <!-- Section 2: Emergency Contact -->
            <div class="form-section">
                <h2 class="section-title">02. Emergency Contact</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="emergencyName" class="required">Contact Name</label>
                        <input type="text" id="emergencyName" name="emergencyName" required>
                    </div>
                    <div class="form-group">
                        <label for="emergencyRelation" class="required">Relationship to Patient</label>
                        <input type="text" id="emergencyRelation" name="emergencyRelation" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="emergencyPhone" class="required">Emergency Phone Number</label>
                        <input type="tel" id="emergencyPhone" name="emergencyPhone" placeholder="+966 5X XXX XXXX" pattern="^(?:\+966|0)?5[0-9]{8}$" title="Please enter a valid Saudi phone number starting with +9665 or 05" required>
                    </div>
                </div>
            </div>

            <!-- Section 3: Medical History -->
            <div class="form-section">
                <h2 class="section-title">03. Medical History</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bloodType">Blood Type</label>
                        <select id="bloodType" name="bloodType">
                            <option value="">Unknown</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" step="0.1">
                    </div>
                    <div class="form-group full-width">
                        <label for="allergies">Known Allergies</label>
                        <textarea id="allergies" name="allergies" placeholder="List any allergies here, or write 'None'"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="medications">Current Medications</label>
                        <textarea id="medications" name="medications" placeholder="List any medications you are currently taking"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="conditions">Chronic Conditions</label>
                        <textarea id="conditions" name="conditions" placeholder="e.g., Diabetes, Hypertension"></textarea>
                    </div>
                </div>
            </div>

            <!-- Section 4: Insurance Details -->
            <div class="form-section">
                <h2 class="section-title">04. Insurance Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="insuranceProvider">Insurance Provider</label>
                        <input type="text" id="insuranceProvider" name="insuranceProvider">
                    </div>
                    <div class="form-group">
                        <label for="policyNumber">Policy / ID Number</label>
                        <input type="text" id="policyNumber" name="policyNumber">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Securely Submit Record</button>
        </form>

        <div id="success-message">
            ✓ Success! Patient information has been securely transmitted to the administration dashboard.
        </div>
    </div>

    <script>
        // --- Advanced Dark/Light Mode Logic ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const body = document.body;

        // Check LocalStorage to sync theme across pages
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeIcon.innerText = '☀️';
            themeText.innerText = 'Light';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Light';
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Dark';
            }
        });

        // --- Formspree Submission Logic ---
        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const form = e.target;
            const data = new FormData(form);
            const submitBtn = form.querySelector('.btn-submit');
            
            // Temporary button state while submitting
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Submitting...';
            submitBtn.disabled = true;
            
            fetch(form.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    document.getElementById('success-message').style.display = 'block';
                    form.reset();

                    setTimeout(() => {
                        document.getElementById('success-message').style.display = 'none';
                    }, 6000);
                    
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert("System Error: There was a problem submitting your form. Please try again.");
                }
            }).catch(error => {
                alert("Network Error: There was a problem connecting to the server.");
            }).finally(() => {
                // Restore button state
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
