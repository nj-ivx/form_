<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feras Company - Patient Intake Form</title>
    <style>
        /* Light Mode Variables (Default) */
        :root {
            --input-focus: #2d8cf0;
            --font-color: #323232;
            --font-color-sub: #666;
            --bg-color: beige;
            --main-color: black;
            --form-bg: lightblue;
            --body-bg: #f4f7f6;
            --section-bg: #fff;
            --danger-color: #dc3545;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --input-focus: #ffde59;
            --font-color: #f0f0f0;
            --font-color-sub: #bbb;
            --bg-color: #2a2a2a;
            --main-color: #e0e0e0;
            --form-bg: #1a3a5a;
            --body-bg: #121212;
            --section-bg: #222;
            --danger-color: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            color: var(--font-color);
            line-height: 1.6;
            padding: 40px 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--form-bg);
            padding: 40px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            box-shadow: 8px 8px var(--main-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: -10px;
        }

        .btn-toggle {
            padding: 8px 16px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            background-color: var(--bg-color);
            box-shadow: 4px 4px var(--main-color);
            font-size: 14px;
            font-weight: 900;
            color: var(--font-color);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .btn-toggle:active {
            box-shadow: 0px 0px var(--main-color);
            transform: translate(4px, 4px);
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            color: var(--font-color);
            font-weight: 900;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--font-color-sub);
            font-weight: 600;
            font-size: 17px;
        }

        .form-section {
            margin-bottom: 25px;
            background: var(--section-bg);
            padding: 25px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            box-shadow: 4px 4px var(--main-color);
            transition: all 0.3s ease;
        }

        .section-title {
            font-size: 20px;
            color: var(--font-color);
            font-weight: 900;
            border-bottom: 2px solid var(--main-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 900;
            margin-bottom: 8px;
            font-size: 15px;
            color: var(--font-color);
        }

        .required::after {
            content: " *";
            color: var(--danger-color);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            background-color: var(--bg-color);
            box-shadow: 4px 4px var(--main-color);
            font-size: 15px;
            font-weight: 600;
            color: var(--font-color);
            padding: 10px 12px;
            outline: none;
            transition: border 0.2s ease, transform 0.1s ease, background-color 0.3s ease;
            font-family: inherit;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--font-color-sub);
            opacity: 0.8;
            font-weight: 500;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border: 2px solid var(--input-focus);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            margin: 20px auto 0 auto;
            width: 100%;
            max-width: 300px;
            height: 50px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            background-color: var(--bg-color);
            box-shadow: 4px 4px var(--main-color);
            font-size: 18px;
            font-weight: 900;
            color: var(--font-color);
            cursor: pointer;
            transition: all 0.1s ease;
            display: block;
        }

        .btn-submit:active {
            box-shadow: 0px 0px var(--main-color);
            transform: translate(4px, 4px);
        }

        #success-message {
            display: none;
            background-color: var(--bg-color);
            color: var(--font-color);
            font-weight: 900;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid var(--main-color);
            box-shadow: 4px 4px var(--main-color);
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .btn-submit {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Theme Toggle Button -->
        <div class="top-bar">
            <button type="button" id="themeToggle" class="btn-toggle">🌙 Dark Mode</button>
        </div>

        <div class="header">
            <h1>Feras Company</h1>
            <p>Confidential Patient Information Form</p>
        </div>

        <!-- The action attribute now contains your custom Formspree link -->
        <form id="patientForm" action="https://formspree.io/f/xwvgbbrj" method="POST">
            
            <!-- Section 1: Personal Information -->
            <div class="form-section">
                <h2 class="section-title">1. Personal Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="firstName" class="required">First Name</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName" class="required">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="dob" class="required">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="gender" class="required">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select...</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer_not_to_say">Prefer not to say</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="phone" class="required">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+966 5X XXX XXXX" pattern="^(?:\+966|0)?5[0-9]{8}$" title="Please enter a valid Saudi phone number starting with +9665 or 05" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="patient@example.com">
                    </div>
                    <div class="form-group full-width">
                        <label for="address" class="required">Home Address</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                </div>
            </div>

            <!-- Section 2: Emergency Contact -->
            <div class="form-section">
                <h2 class="section-title">2. Emergency Contact</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="emergencyName" class="required">Contact Name</label>
                        <input type="text" id="emergencyName" name="emergencyName" required>
                    </div>
                    <div class="form-group">
                        <label for="emergencyRelation" class="required">Relationship to Patient</label>
                        <input type="text" id="emergencyRelation" name="emergencyRelation" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="emergencyPhone" class="required">Emergency Phone Number</label>
                        <input type="tel" id="emergencyPhone" name="emergencyPhone" placeholder="+966 5X XXX XXXX" pattern="^(?:\+966|0)?5[0-9]{8}$" title="Please enter a valid Saudi phone number starting with +9665 or 05" required>
                    </div>
                </div>
            </div>

            <!-- Section 3: Medical History -->
            <div class="form-section">
                <h2 class="section-title">3. Medical History</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bloodType">Blood Type</label>
                        <select id="bloodType" name="bloodType">
                            <option value="">Unknown</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" step="0.1">
                    </div>
                    <div class="form-group full-width">
                        <label for="allergies">Known Allergies</label>
                        <textarea id="allergies" name="allergies" placeholder="List any allergies here, or write 'None'"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="medications">Current Medications</label>
                        <textarea id="medications" name="medications" placeholder="List any medications you are currently taking"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="conditions">Chronic Conditions</label>
                        <textarea id="conditions" name="conditions" placeholder="e.g., Diabetes, Hypertension"></textarea>
                    </div>
                </div>
            </div>

            <!-- Section 4: Insurance Details -->
            <div class="form-section">
                <h2 class="section-title">4. Insurance Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="insuranceProvider">Insurance Provider</label>
                        <input type="text" id="insuranceProvider" name="insuranceProvider">
                    </div>
                    <div class="form-group">
                        <label for="policyNumber">Policy / ID Number</label>
                        <input type="text" id="policyNumber" name="policyNumber">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Submit Form →</button>
        </form>

        <div id="success-message">
            Success! Patient information has been securely recorded.
        </div>
    </div>

    <script>
        // --- Dark/Light Mode Logic ---
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.innerText = '☀️ Light Mode';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerText = '☀️ Light Mode';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerText = '🌙 Dark Mode';
            }
        });

        // --- Admin Form Submission Logic (Formspree) ---
        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const form = e.target;
            const data = new FormData(form);
            
            // Send the data securely to your Formspree Admin Dashboard
            fetch(form.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // Show success message
                    document.getElementById('success-message').style.display = 'block';
                    
                    // Clear the form
                    form.reset();

                    // Hide message after 5 seconds
                    setTimeout(() => {
                        document.getElementById('success-message').style.display = 'none';
                    }, 5000);
                    
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert("Oops! There was a problem submitting your form.");
                }
            }).catch(error => {
                alert("Oops! There was a problem submitting your form.");
            });
        });
    </script>
</body>
</html>
